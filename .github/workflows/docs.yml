name: 📘 Deploy docs to GitHub Pages

on:
    push:
        branches: [main]
        # `src/**` so a shipped module regenerates its TypeDoc API page;
        # `package.json`/`README.md` so a release's version bump + readme
        # changes redeploy. Without src/**, merging a module never refreshed
        # the site (the original "docs don't show new stuff" bug).
        paths:
            - 'apps/docs/**'
            - 'src/**'
            - 'package.json'
            - 'README.md'
            - '.github/workflows/docs.yml'
            - 'pnpm-workspace.yaml'
    # semantic-release publishes a GitHub Release after the version commit lands;
    # rebuild then too, so the site always tracks the latest release.
    release:
        types: [published]
    workflow_dispatch:

concurrency:
    group: pages
    cancel-in-progress: false

permissions:
    contents: read
    pages: write
    id-token: write

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: 📦 Checkout repository
              uses: actions/checkout@v6

            - name: 📦 Setup pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: latest

            - name: 📦 Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '22'
                  cache: pnpm

            - name: 📦 Install dependencies
              run: pnpm install --frozen-lockfile

            - name: 🏗️ Build Docusaurus site
              run: pnpm --filter @rtorcato/cf-common-docs build

            - name: 📤 Upload Pages artifact
              uses: actions/upload-pages-artifact@v5
              with:
                  path: apps/docs/build

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: 🚀 Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v5
